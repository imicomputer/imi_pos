version: '3.9'

services:
  backoffice-db:
    image: mysql:8.0
    container_name: backoffice-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Sparkling123
      MYSQL_DATABASE: pos
      MYSQL_USER: imipos
      MYSQL_PASSWORD: ImiPos123
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
      - /home/imi/imi_pos/database:/home/db_backup
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    name: imipos_mysql_data
